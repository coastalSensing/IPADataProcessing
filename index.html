<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPA MIP Classifier Portal — AI (</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500;600&display=swap');
:root{
  --bg:#f0f4f8;--panel:#ffffff;--panel2:#f5f8fb;--border:#dde4ed;--border2:#c8d4e0;
  --accent:#0071b8;--accent2:#005a8e;--pos:#1a8c4e;--neg:#cc2233;--warn:#b07800;
  --mixed:#5a50c8;--art:#c05000;--hydro:#0080b0;--metal:#b02040;
  --text:#1a2533;--dim:#8099b0;--dim2:#607a90;--dim3:#3a5570;
  --font-mono:'Space Mono',monospace;--font-ui:'Inter',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body,#root{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-ui);font-size:13px;}
body{overflow:hidden;}
.app{display:grid;grid-template-rows:52px 1fr;height:100vh;}
.topbar{background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:16px;z-index:100;}
.topbar h1{font-family:var(--font-mono);font-size:13px;color:var(--accent);letter-spacing:.08em;white-space:nowrap;}
.sep{width:1px;height:20px;background:var(--border2);}
.main{display:grid;grid-template-columns:260px 1fr 320px;overflow:hidden;}
.sidebar{background:var(--panel);border-right:1px solid var(--border);overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px;}
.content{overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;}
.ai-panel{background:var(--panel);border-left:1px solid var(--border);overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;}

/* Sidebar */
.upload-zone{border:1px dashed var(--border2);border-radius:4px;padding:16px 12px;text-align:center;cursor:pointer;transition:border-color .2s;}
.upload-zone:hover,.upload-zone.drag{border-color:var(--accent);}
.upload-zone .icon{font-size:20px;margin-bottom:6px;}
.upload-zone p{font-size:11px;color:var(--dim2);line-height:1.5;}
.upload-zone span{color:var(--accent);}
.file-item{display:flex;align-items:center;gap:7px;padding:6px 8px;border-radius:3px;cursor:pointer;border:1px solid transparent;transition:all .15s;}
.file-item:hover{background:var(--panel2);}
.file-item.active{background:var(--panel2);border-color:var(--border2);}
.file-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.file-name{font-size:11px;color:var(--dim3);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.file-info{font-size:9px;color:var(--dim);font-family:var(--font-mono);}
.sidebar-label{font-family:var(--font-mono);font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--dim);padding:0 2px;}
.btn{padding:7px 14px;border-radius:3px;border:none;cursor:pointer;font-family:var(--font-mono);font-size:11px;letter-spacing:.05em;transition:all .15s;white-space:nowrap;}
.btn-primary{background:var(--accent);color:#000;font-weight:700;}
.btn-primary:hover{background:#00a8c8;color:#000;}
.btn-primary:disabled{opacity:.4;cursor:default;}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--dim3);}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent);}
.btn-sm{padding:4px 10px;font-size:10px;}
.btn-ai{background:linear-gradient(135deg,#0071b8,#00a8d0);color:#fff;font-weight:700;border:none;}
.btn-ai:hover{opacity:.9;}
.btn-ai:disabled{opacity:.35;cursor:default;}

/* Stats */
.statsbar{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;}
.stat{background:var(--panel);border:1px solid var(--border);border-radius:3px;padding:9px 11px;}
.stat label{font-family:var(--font-mono);font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--dim2);display:block;margin-bottom:3px;}
.stat .val{font-family:var(--font-mono);font-size:15px;font-weight:700;color:var(--accent);}
.stat .sub{font-family:var(--font-mono);font-size:9px;color:var(--dim);margin-top:2px;}

/* Charts */
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.chart-panel{background:var(--panel);border:1px solid var(--border);border-radius:3px;padding:10px 12px;}
.chart-panel.full{grid-column:1/-1;}
.chart-title{font-family:var(--font-mono);font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--dim2);margin-bottom:7px;display:flex;justify-content:space-between;align-items:center;}
canvas{display:block;width:100%;}
.legend{display:flex;flex-wrap:wrap;gap:10px;margin-top:5px;}
.li{display:flex;align-items:center;gap:5px;font-family:var(--font-mono);font-size:9px;color:var(--dim2);}
.ld{width:14px;height:2px;border-radius:1px;}

/* Events table */
.events-wrap{overflow-x:auto;}
.events-table{width:100%;border-collapse:collapse;min-width:700px;}
.events-table th{font-family:var(--font-mono);font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--dim2);text-align:left;padding:6px 8px;border-bottom:1px solid var(--border2);white-space:nowrap;}
.events-table td{padding:6px 8px;border-bottom:1px solid var(--border);font-family:var(--font-mono);font-size:11px;vertical-align:middle;}
.events-table tr:hover td{background:var(--panel2);}
.events-table tr.selected td{background:var(--panel2);border-bottom-color:var(--border2);}
.badge{display:inline-block;padding:2px 7px;border-radius:2px;font-size:10px;font-weight:700;font-family:var(--font-mono);}
.badge-hydro{background:rgba(0,113,184,.10);color:var(--hydro);}
.badge-metal{background:rgba(176,32,64,.10);color:var(--metal);}
.badge-mixed{background:rgba(90,80,200,.10);color:var(--mixed);}
.badge-art{background:rgba(192,80,0,.10);color:var(--art);}
.badge-weak{background:rgba(80,100,130,.10);color:var(--dim3);}
.conf-bar{display:flex;align-items:center;gap:5px;}
.conf-fill{height:4px;border-radius:2px;min-width:2px;}
.conf-text{font-size:9px;color:var(--dim2);white-space:nowrap;}

/* AI Panel */
.ai-section-title{font-family:var(--font-mono);font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--dim2);}
.api-key-row{display:flex;gap:6px;}
.api-key-input{flex:1;background:var(--panel2);border:1px solid var(--border2);color:var(--text);font-family:var(--font-mono);font-size:11px;padding:6px 9px;border-radius:3px;}
.api-key-input:focus{outline:none;border-color:var(--accent);}
.ai-response{background:var(--panel2);border:1px solid var(--border2);border-radius:3px;padding:10px 12px;flex:1;min-height:120px;}
.ai-response p{font-size:12px;color:var(--dim3);line-height:1.7;white-space:pre-wrap;}
.ai-response .thinking{color:var(--dim);font-style:italic;font-size:11px;}
.ai-classification{background:var(--panel2);border:1px solid var(--border2);border-radius:3px;padding:10px 12px;}
.ai-cls-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.ai-cls-label{font-size:10px;color:var(--dim2);font-family:var(--font-mono);}
.ai-cls-val{font-size:14px;font-weight:600;font-family:var(--font-mono);}
.ai-conf-val{font-family:var(--font-mono);font-size:12px;color:var(--dim3);}
.training-entry{display:flex;align-items:center;gap:6px;padding:4px 6px;border-radius:2px;background:var(--panel2);font-size:10px;font-family:var(--font-mono);}
.training-entry .mat{font-weight:700;}
.training-list{display:flex;flex-direction:column;gap:3px;max-height:160px;overflow-y:auto;}
.confirm-row{display:flex;gap:6px;align-items:center;}
.confirm-sel{flex:1;background:var(--panel2);border:1px solid var(--border2);color:var(--text);font-family:var(--font-mono);font-size:10px;padding:5px 8px;border-radius:3px;}
.confirm-sel:focus{outline:none;border-color:var(--pos);}
.confirm-btn{background:#1a8c4e;color:#000;border:none;padding:5px 10px;border-radius:3px;font-family:var(--font-mono);font-size:10px;cursor:pointer;font-weight:700;white-space:nowrap;}
.confirm-btn:hover{opacity:.85;}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:280px;color:var(--dim);gap:10px;}
.empty .icon{font-size:32px;opacity:.3;}
.empty p{font-family:var(--font-mono);font-size:11px;text-align:center;line-height:1.7;}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:#c0ccd8;border-radius:2px;}
::-webkit-scrollbar-thumb:hover{background:var(--dim);}

/* ── Collections ── */
.coll-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.coll-list{display:flex;flex-direction:column;gap:3px;}
.coll-item{border:1px solid var(--border);border-radius:3px;overflow:hidden;}
.coll-item.active-coll{border-color:var(--accent);}
.coll-title-row{display:flex;align-items:center;gap:6px;padding:6px 8px;cursor:pointer;background:var(--panel2);transition:background .15s;}
.coll-title-row:hover{background:var(--border);}
.coll-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0;}
.coll-name{font-size:11px;font-weight:600;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.coll-meta{font-size:9px;color:var(--dim2);font-family:var(--font-mono);white-space:nowrap;}
.coll-files{padding:4px 8px 6px 24px;display:flex;flex-direction:column;gap:2px;background:var(--panel);}
.coll-file-row{display:flex;align-items:center;gap:6px;padding:3px 4px;border-radius:2px;cursor:pointer;font-size:10px;font-family:var(--font-mono);color:var(--dim3);}
.coll-file-row:hover{background:var(--panel2);color:var(--text);}
.coll-file-row.active{color:var(--accent);font-weight:700;}
.coll-mat-pill{display:inline-block;padding:1px 5px;border-radius:10px;font-size:9px;font-family:var(--font-mono);margin-left:auto;white-space:nowrap;}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;z-index:999;}
.modal{background:var(--panel);border:1px solid var(--border2);border-radius:6px;padding:24px;width:400px;box-shadow:0 8px 32px rgba(0,0,0,.18);}
.modal h2{font-family:var(--font-mono);font-size:13px;color:var(--accent);margin-bottom:14px;}
.modal label{font-family:var(--font-mono);font-size:10px;color:var(--dim2);display:block;margin-bottom:4px;margin-top:10px;}
.modal input,.modal select{width:100%;background:var(--panel2);border:1px solid var(--border2);color:var(--text);font-family:var(--font-mono);font-size:12px;padding:6px 9px;border-radius:3px;}
.modal input:focus,.modal select:focus{outline:none;border-color:var(--accent);}
.modal .modal-btns{display:flex;gap:8px;margin-top:18px;justify-content:flex-end;}
.color-swatches{display:flex;gap:6px;margin-top:4px;flex-wrap:wrap;}
.swatch{width:20px;height:20px;border-radius:3px;cursor:pointer;border:2px solid transparent;transition:border-color .15s;}
.swatch:hover,.swatch.sel{border-color:var(--text);}
.tab-row{display:flex;border-bottom:1px solid var(--border);margin-bottom:10px;}
.tab{padding:6px 14px;font-family:var(--font-mono);font-size:10px;cursor:pointer;color:var(--dim2);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;text-transform:uppercase;letter-spacing:.06em;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.tab:hover:not(.active){color:var(--text);}
.export-box{background:var(--panel2);border:1px solid var(--border);border-radius:3px;padding:10px;font-family:var(--font-mono);font-size:10px;color:var(--dim3);white-space:pre-wrap;max-height:120px;overflow-y:auto;}

/* ── Map panel ── */
.map-panel{background:var(--panel2);border:1px solid var(--border);border-radius:3px;position:relative;overflow:hidden;}
.map-canvas{display:block;width:100%;cursor:crosshair;}
.map-legend{position:absolute;bottom:8px;left:8px;background:rgba(255,255,255,.92);border:1px solid var(--border);border-radius:3px;padding:6px 10px;font-family:var(--font-mono);font-size:9px;line-height:1.8;}
.map-controls{position:absolute;top:8px;right:8px;display:flex;flex-direction:column;gap:4px;}
.map-btn{background:rgba(255,255,255,.9);border:1px solid var(--border2);border-radius:3px;padding:4px 8px;cursor:pointer;font-size:11px;font-family:var(--font-mono);}
.map-btn:hover{background:#fff;border-color:var(--accent);}
.map-tooltip{position:absolute;background:rgba(255,255,255,.97);border:1px solid var(--border2);border-radius:3px;padding:6px 10px;font-family:var(--font-mono);font-size:10px;pointer-events:none;box-shadow:0 2px 8px rgba(0,0,0,.12);max-width:220px;line-height:1.6;}
/* ── Lab output table ── */
.lab-table{width:100%;border-collapse:collapse;font-family:var(--font-mono);font-size:11px;}
.lab-table th{text-align:right;padding:4px 10px;border-bottom:1px solid var(--border2);font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--dim2);white-space:nowrap;}
.lab-table th:first-child{text-align:left;}
.lab-table td{text-align:right;padding:4px 10px;border-bottom:1px solid var(--border);color:var(--text);}
.lab-table td:first-child{text-align:left;color:var(--dim3);}
.lab-table tr:hover td{background:var(--panel2);}

/* ── Map & run organizer additions ── */
.map-wrap{position:relative;background:#e8eef4;border-radius:3px;border:1px solid var(--border);overflow:hidden;}
.map-canvas{display:block;width:100%;cursor:crosshair;}
.map-tip{position:absolute;background:rgba(255,255,255,.97);border:1px solid var(--border2);border-radius:3px;
  padding:5px 9px;font-family:var(--font-mono);font-size:10px;pointer-events:none;
  box-shadow:0 2px 6px rgba(0,0,0,.12);max-width:200px;line-height:1.55;z-index:20;}
.map-toggles{display:flex;gap:6px;margin-bottom:8px;align-items:center;flex-wrap:wrap;}
.tog{padding:4px 10px;border-radius:3px;border:1px solid var(--border2);background:var(--panel);
  font-family:var(--font-mono);font-size:10px;cursor:pointer;color:var(--dim3);transition:all .15s;}
.tog.on{background:var(--accent);color:#fff;border-color:var(--accent);}
.tog:hover:not(.on){border-color:var(--accent);color:var(--accent);}
.run-group{border:1px solid var(--border);border-radius:3px;overflow:hidden;margin-bottom:6px;}
.run-group-hdr{display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--panel2);
  cursor:pointer;font-family:var(--font-mono);font-size:10px;}
.run-group-hdr:hover{background:var(--border);}
.run-group-name{font-weight:700;color:var(--text);flex:1;}
.run-group-body{padding:4px 6px;display:flex;flex-direction:column;gap:2px;}
.run-entry{display:flex;align-items:center;gap:6px;padding:4px 8px;border-radius:2px;
  cursor:pointer;font-family:var(--font-mono);font-size:10px;color:var(--dim3);}
.run-entry:hover{background:var(--panel2);color:var(--text);}
.run-entry.active{background:var(--panel2);color:var(--accent);font-weight:700;}
.run-swatch{width:10px;height:10px;border-radius:2px;flex-shrink:0;}
.lab-tbl{width:100%;border-collapse:collapse;font-family:var(--font-mono);font-size:11px;}
.lab-tbl th{text-align:right;padding:4px 10px;border-bottom:1px solid var(--border2);
  font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--dim2);white-space:nowrap;}
.lab-tbl th:first-child{text-align:left;}
.lab-tbl td{text-align:right;padding:4px 10px;border-bottom:1px solid var(--border);color:var(--text);}
.lab-tbl td:first-child{text-align:left;color:var(--dim3);}
.lab-tbl tr:hover td{background:var(--panel2);}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;
  align-items:center;justify-content:center;z-index:999;}
.modal{background:var(--panel);border:1px solid var(--border2);border-radius:6px;
  padding:22px;width:380px;box-shadow:0 8px 32px rgba(0,0,0,.18);}
.modal h3{font-family:var(--font-mono);font-size:12px;color:var(--accent);margin-bottom:12px;}
.modal label{font-family:var(--font-mono);font-size:10px;color:var(--dim2);display:block;
  margin-top:10px;margin-bottom:3px;}
.modal input,.modal select{width:100%;background:var(--panel2);border:1px solid var(--border2);
  color:var(--text);font-family:var(--font-mono);font-size:12px;padding:6px 8px;border-radius:3px;}
.modal input:focus,.modal select:focus{outline:none;border-color:var(--accent);}
.modal-btns{display:flex;gap:8px;margin-top:16px;justify-content:flex-end;}
.color-row{display:flex;gap:5px;margin-top:4px;flex-wrap:wrap;}
.cswatch{width:20px;height:20px;border-radius:3px;cursor:pointer;border:2px solid transparent;}
.cswatch:hover,.cswatch.sel{border-color:var(--text);}
</style>
